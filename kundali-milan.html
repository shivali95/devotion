<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>Kundali Milan — Jyotish Saathi</title>
<style>
@font-face { font-family:'JioType'; font-weight:400; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeVarW05-Regular.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:500; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Medium.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:700; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Bold.woff2') format('woff2'); }
@font-face { font-family:'JioType'; font-weight:900; src:url('https://raw.githubusercontent.com/sunit1986/JioBharatIQ_Server/main/assets/fonts/woff2/JioTypeW05-Black.woff2') format('woff2'); }

:root {
  --surface:#ffffff; --surface-ghost:#eeeeef; --surface-ghost-icon:#e7e9ff;
  --surface-bold:#3900ad; --surface-minimal:#f5f5f6; --surface-moderate:#e3e3e4;
  --text-high:#0c0d10; --text-medium:#191b1e; --text-low:rgba(25,27,30,0.65);
  --text-on-bold:#ffffff; --icon-medium:#170054; --icon-high:#0c0d10;
  --primary-20:#e8e8fc; --primary-30:#9999ff; --primary-50:#3535f3;
  --primary-60:#000093; --primary-70:#00004c;
  --sparkle-20:#e8faf7; --sparkle-30:#a7f6e9; --sparkle-50:#1eccb0;
  --secondary-20:#fef7e9; --secondary-30:#ffe3ae; --secondary-50:#f7ab20; --secondary-60:#ac660c;
  --success:#25ab21; --success-20:#e6f7e6;
  --error:#fa2f40; --error-20:#fde8ea; --warning:#f06d0f; --warning-20:#fff0e6;
  --grey-100:#141414; --grey-80:rgba(0,0,0,0.66); --grey-60:#b5b5b5; --grey-40:#e0e0e0; --grey-20:#f5f5f5;
  --shape-pill:999px; --shape-large:16px; --shape-medium:12px; --shape-small:8px; --shape-4xl:23px;
  --stroke-subtle:rgba(36,38,43,0.12);
  --ease-standard:cubic-bezier(0.4,0.0,0.2,1); --ease-decelerate:cubic-bezier(0.0,0.0,0.2,1);
  --dur-quick:150ms; --dur-mod:250ms; --dur-del:350ms;
  --astro-gold:#f7ab20; --astro-gold-bg:#fef7e9; --astro-gold-dark:#ac660c;
  --astro-deep:#1a0a5e; --astro-purple:#6d17ce;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior:none;touch-action:manipulation;}
body{font-family:'JioType',-apple-system,BlinkMacSystemFont,sans-serif;background:#e8e8e8;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 0;}
@media(max-width:768px){body{background:#fff!important;padding:0!important;align-items:stretch!important;}.phone-frame{width:100%!important;height:100vh!important;height:100dvh!important;border-radius:0!important;box-shadow:none!important;}}

.phone-frame{width:360px;height:800px;background:var(--surface);position:relative;overflow:hidden;display:flex;flex-direction:column;border-radius:32px;box-shadow:0 24px 80px rgba(0,0,0,0.15);}

/* STATUS BAR */
.status-bar{height:52px;padding:14px 24px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--surface);}
.status-bar .time{font-size:15px;font-weight:600;color:var(--text-high);}
.status-bar .icons{display:flex;gap:6px;align-items:center;}
.status-bar .icons svg{width:16px;height:16px;fill:var(--text-high);}

/* HEADER */
.header-nav{height:56px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--surface-moderate);background:var(--surface);}
.header-left{display:flex;align-items:center;gap:8px;}
.back-btn{width:40px;height:40px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;transition:background var(--dur-quick) var(--ease-standard);text-decoration:none;color:inherit;}
.back-btn:active{background:var(--grey-20);}
.back-btn svg{width:24px;height:24px;fill:var(--icon-medium);}
.header-title-area{flex:1;}
.header-title{font-size:16px;font-weight:500;color:var(--text-high);line-height:1;}
.header-domain{font-size:12px;color:var(--text-low);line-height:1.3;}

/* CHAT */
.chat-container{flex:1;overflow-y:auto;overflow-x:clip;padding:16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:none;}
.chat-container::-webkit-scrollbar{display:none;}

/* AI MESSAGE */
.ai-msg{display:flex;gap:8px;align-items:flex-start;animation:msgIn var(--dur-del) var(--ease-decelerate);}
.ai-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(135deg,#2d0a8a,var(--astro-purple));display:flex;align-items:center;justify-content:center;font-size:15px;}
.ai-content{flex:1;max-width:calc(100% - 40px);min-width:0;}
.ai-text{font-size:14px;line-height:1.5;color:var(--text-high);letter-spacing:-0.005em;}
.ai-text strong{font-weight:700;}

/* USER MESSAGE */
.user-msg{display:flex;justify-content:flex-end;animation:msgIn var(--dur-del) var(--ease-decelerate);}
.user-bubble{max-width:270px;background:var(--surface-ghost);color:var(--text-high);padding:12px 16px;border-radius:24px 24px 0 24px;font-size:14px;line-height:1.4;letter-spacing:-0.005em;font-weight:500;}

/* THINKING */
.thinking-row{display:flex;align-items:center;gap:8px;animation:msgIn var(--dur-mod) var(--ease-decelerate);}
.thinking-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#2d0a8a,var(--astro-purple));display:flex;align-items:center;justify-content:center;font-size:14px;}
.thinking-dots{display:flex;gap:4px;}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--astro-purple);animation:dotBounce 1.2s infinite;}
.thinking-dots span:nth-child(2){animation-delay:.15s;}
.thinking-dots span:nth-child(3){animation-delay:.3s;}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}

/* FEEDBACK */
.feedback-row{display:flex;gap:2px;margin-top:8px;}
.fb-btn{width:29px;height:29px;border-radius:var(--shape-pill);background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fb-btn svg{width:16px;height:16px;fill:var(--icon-high);}

/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;width:100%;}
@keyframes chipAppear{0%{opacity:0;transform:translateY(5px) scale(0.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
.chip-appear-1{animation:chipAppear 220ms var(--ease-decelerate) 0ms both}
.chip-appear-2{animation:chipAppear 220ms var(--ease-decelerate) 70ms both}
.chip-appear-3{animation:chipAppear 220ms var(--ease-decelerate) 140ms both}
.chip-appear-4{animation:chipAppear 220ms var(--ease-decelerate) 210ms both}
.chip{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:1.5px solid var(--stroke-subtle);border-radius:var(--shape-pill);background:var(--surface);font-family:'JioType',sans-serif;font-size:13px;font-weight:500;color:var(--text-high);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all var(--dur-quick) var(--ease-standard);}
.chip:active{transform:scale(0.97);}
.chip.cta{background:var(--surface-bold);border-color:var(--surface-bold);color:#fff;font-weight:700;}
.chip.gold{background:var(--astro-gold-bg);border-color:var(--secondary-30);color:var(--astro-gold-dark);font-weight:600;}

/* BOTTOM INPUT */
.bottom-widget{width:100%;padding:2px 12px 8px;background:var(--surface);flex-shrink:0;}
.bw-container{background:var(--surface-ghost);border-radius:var(--shape-4xl);padding:6px;}
.bw-input{padding:8px 8px 4px;}
.bw-real-input{flex:1;border:none;outline:none;font-family:'JioType',sans-serif;font-size:14px;color:var(--text-high);background:transparent;width:100%;}
.bw-real-input::placeholder{color:var(--text-low);}
.bw-actions{display:flex;justify-content:space-between;align-items:center;height:43px;}
.bw-left{display:flex;gap:2px;}
.wib{width:36px;height:36px;border-radius:var(--shape-pill);display:flex;align-items:center;justify-content:center;background:var(--surface-ghost-icon);border:none;cursor:pointer;}
.wib svg{width:20px;height:20px;fill:var(--icon-medium);}
.bw-send{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface-bold);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.bw-send svg{width:18px;height:18px;fill:var(--text-on-bold);}

/* FORM CARD */
.form-card{background:var(--surface);border-radius:var(--shape-large);border:1px solid var(--stroke-subtle);box-shadow:0 2px 16px rgba(0,0,0,0.07);overflow:hidden;width:100%;}
.fc-header{background:linear-gradient(135deg,var(--primary-70),#2d0a8a);padding:12px 16px;display:flex;align-items:center;gap:8px;}
.fc-header-title{font-size:14px;font-weight:700;color:#fff;}
.fc-cols{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.fc-col{padding:12px 10px 10px;border-right:1px solid var(--grey-40);}
.fc-col:last-child{border-right:none;}
.fc-col-label{font-size:10px;font-weight:800;color:var(--primary-50);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
.field-group{margin-bottom:8px;}
.field-label{font-size:10px;color:var(--text-low);font-weight:600;margin-bottom:3px;}
.field-input{background:var(--surface-ghost);border-radius:var(--shape-small);border:none;padding:7px 9px;font-size:12px;font-family:'JioType',sans-serif;color:var(--text-high);width:100%;outline:none;}
.field-input:focus{background:var(--primary-20);}
.fc-footer{padding:4px 12px 12px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--grey-40);margin-top:4px;padding-top:10px;}
.fc-or{font-size:11px;color:var(--text-low);flex-shrink:0;}
.fc-upload{background:var(--surface-ghost);border:none;border-radius:var(--shape-small);padding:7px 12px;font-size:11px;font-weight:600;color:var(--text-medium);cursor:pointer;font-family:'JioType',sans-serif;display:flex;align-items:center;gap:5px;}
.fc-match-btn{width:calc(100% - 24px);margin:0 12px 12px;padding:13px;background:var(--primary-50);border:none;border-radius:var(--shape-pill);font-family:'JioType',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;}
.fc-match-btn:active{opacity:0.85;}

/* GEN STEPS */
.gen-card{background:var(--surface);border-radius:var(--shape-large);border:1px solid var(--stroke-subtle);padding:16px;width:100%;}
.gen-title{font-size:14px;font-weight:700;color:var(--text-high);margin-bottom:12px;}
.gen-step{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:13px;color:var(--text-low);opacity:0;transform:translateY(4px);transition:opacity 0.3s,transform 0.3s;}
.gen-step.active{opacity:1;transform:translateY(0);color:var(--primary-50);font-weight:600;}
.gen-step.done{opacity:1;transform:translateY(0);color:var(--success);}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--grey-40);flex-shrink:0;}
.gen-step.active .step-dot{background:var(--primary-50);animation:stepPulse 0.8s infinite;}
.gen-step.done .step-dot{background:var(--success);}
@keyframes stepPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* SCORE CARD */
.score-card{background:var(--surface);border-radius:var(--shape-large);border:1px solid var(--stroke-subtle);box-shadow:0 2px 16px rgba(0,0,0,0.07);overflow:hidden;width:100%;animation:cardIn 350ms var(--ease-decelerate);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.sc-header{background:linear-gradient(135deg,var(--primary-70),#2d0a8a);padding:16px;display:flex;align-items:center;gap:14px;}
.sc-ring{width:64px;height:64px;flex-shrink:0;}
.sc-ring svg{width:64px;height:64px;}
.sc-info{flex:1;}
.sc-names{font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:2px;}
.sc-score-row{display:flex;align-items:baseline;gap:4px;}
.sc-num{font-size:30px;font-weight:900;color:#fff;line-height:1;}
.sc-denom{font-size:13px;color:rgba(255,255,255,0.55);}
.sc-verdict{font-size:13px;font-weight:700;color:var(--astro-gold);margin-top:5px;}

.sc-highlights{padding:12px 16px;}
.sc-highlight{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--grey-20);font-size:13px;color:var(--text-medium);line-height:1.45;}
.sc-highlight:last-child{border-bottom:none;}
.sc-hi-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* KOOT TABLE */
.koot-toggle{width:100%;background:none;border:none;border-top:1px solid var(--grey-40);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--primary-50);cursor:pointer;font-family:'JioType',sans-serif;}
.koot-toggle svg{width:16px;height:16px;fill:var(--primary-50);}
.koot-table{display:none;}
.koot-table.open{display:block;}
.koot-row{display:flex;align-items:center;padding:7px 16px;border-bottom:1px solid var(--grey-20);font-size:12px;}
.koot-row:last-child{border-bottom:none;}
.koot-name{flex:0 0 80px;color:var(--text-medium);font-weight:500;}
.koot-bar-wrap{flex:1;margin:0 10px;height:4px;background:var(--grey-20);border-radius:2px;}
.koot-bar{height:4px;border-radius:2px;}
.koot-score{font-weight:700;color:var(--text-high);width:32px;text-align:right;}
.koot-icon{width:20px;text-align:center;font-size:12px;}
.koot-total{padding:8px 16px;background:var(--surface-ghost);font-size:13px;font-weight:700;color:var(--text-high);display:flex;justify-content:space-between;}

/* ASTROLOGER CARD */
.astro-card{background:var(--surface);border-radius:var(--shape-large);border:1px solid var(--stroke-subtle);padding:14px;width:100%;display:flex;gap:12px;align-items:center;}
.astro-avatar{width:44px;height:44px;border-radius:50%;background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.astro-info{flex:1;}
.astro-name{font-size:13px;font-weight:700;color:var(--text-high);}
.astro-sub{font-size:11px;color:var(--text-low);margin-top:1px;}
.astro-ctx{font-size:11px;font-weight:600;color:var(--primary-50);margin-top:4px;}
.astro-btn{background:var(--primary-50);border:none;border-radius:var(--shape-pill);padding:8px 14px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:'JioType',sans-serif;flex-shrink:0;}

/* PDF BOTTOM SHEET */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;align-items:flex-end;}
.sheet-backdrop.open{display:flex;}
.pdf-sheet{background:var(--surface);border-radius:var(--shape-large) var(--shape-large) 0 0;width:100%;padding:20px 20px 32px;}
.sheet-handle{width:32px;height:4px;background:var(--grey-40);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:700;color:var(--text-high);margin-bottom:3px;}
.sheet-sub{font-size:13px;color:var(--text-low);margin-bottom:18px;}
.sheet-opts{display:flex;flex-direction:column;gap:10px;}
.sheet-opt{display:flex;align-items:center;gap:12px;padding:13px;background:var(--surface-ghost);border-radius:var(--shape-medium);cursor:pointer;}
.sheet-opt:active{background:var(--surface-moderate);}
.sheet-opt-icon{width:40px;height:40px;border-radius:10px;background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sheet-opt-icon svg{width:20px;height:20px;fill:var(--icon-medium);}
.sheet-opt-label{font-size:14px;font-weight:600;color:var(--text-high);}
.sheet-opt-sub{font-size:12px;color:var(--text-low);margin-top:1px;}

/* TOAST */
.toast{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);background:var(--grey-100);color:#fff;border-radius:var(--shape-medium);padding:10px 16px;font-size:13px;font-weight:500;white-space:nowrap;z-index:400;display:none;animation:toastIn 0.25s ease;}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,6px);}to{opacity:1;transform:translate(-50%,0);}}

@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="phone-frame" id="app">

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="time">9:41</div>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M2 22h20V2z" opacity=".3"/><path d="M2 22h20V2zm18-2H6.83L20 6.83z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header-nav">
    <div class="header-left">
      <a class="back-btn" href="https://sunit1986.github.io/design-prototypes/jyotish-saathi.html" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </a>
      <div class="header-title-area">
        <div class="header-title">Kundali Milan</div>
        <div class="header-domain">AI Compatibility Analysis</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container" id="CC"></div>

  <!-- Bottom Input -->
  <div class="bottom-widget">
    <div class="bw-container">
      <div class="bw-input">
        <input type="text" class="bw-real-input" id="chatInput" placeholder="Ask about compatibility…" onkeydown="if(event.key==='Enter')handleInput()">
      </div>
      <div class="bw-actions">
        <div class="bw-left">
          <button class="wib" onclick="openPdfSheet()">
            <svg viewBox="0 0 24 24"><path d="M13 6V2H7.5A2.5 2.5 0 005 4.5v15A2.5 2.5 0 007.5 22h10a2.5 2.5 0 002.5-2.5V9h-4a3 3 0 01-3-3zm3 1h4a2 2 0 00-.59-1.41l-3-3A2 2 0 0015 2v4a1 1 0 001 1z"/></svg>
          </button>
        </div>
        <button class="bw-send" onclick="handleInput()">
          <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.4.92l-.01 4.74c0 .5.37.93.87.99L17 12 2.86 13.74c-.5.06-.87.49-.87.99l.01 4.74c0 .71.73 1.2 1.4.93z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- PDF Bottom Sheet -->
  <div class="sheet-backdrop" id="pdfSheet" onclick="if(event.target===this)closePdf()">
    <div class="pdf-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Share Kundali Milan Report</div>
      <div class="sheet-sub" id="sheetSub">Arjun Sharma &amp; Priya Verma · 28/36</div>
      <div class="sheet-opts">
        <div class="sheet-opt" onclick="showToast('Downloading PDF…');setTimeout(closePdf,1500)">
          <div class="sheet-opt-icon">
            <svg viewBox="0 0 24 24"><path d="M13 6V2H7.5A2.5 2.5 0 005 4.5v15A2.5 2.5 0 007.5 22h10a2.5 2.5 0 002.5-2.5V9h-4a3 3 0 01-3-3zm3 1h4a2 2 0 00-.59-1.41l-3-3A2 2 0 0015 2v4a1 1 0 001 1z"/></svg>
          </div>
          <div><div class="sheet-opt-label">Download PDF</div><div class="sheet-opt-sub">Save to phone · 2 pages</div></div>
        </div>
        <div class="sheet-opt" onclick="showToast('Sharing via WhatsApp…');setTimeout(closePdf,1500)">
          <div class="sheet-opt-icon" style="background:#e6f9ee;">
            <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2 22l1.41-5.15A9.97 9.97 0 112 22zm9.95-17a8 8 0 100 16 8 8 0 000-16zm4.07 11.23c-.18.52-.88.95-1.47 1.08-.39.08-.9.15-2.62-.56-2.21-.9-3.63-3.14-3.74-3.28-.11-.14-.89-1.19-.89-2.27 0-1.08.57-1.61.77-1.83.2-.22.44-.27.59-.27h.42c.14 0 .33-.05.51.39.19.46.64 1.56.7 1.67.06.11.1.24.02.38-.08.14-.12.23-.23.35-.11.12-.24.27-.34.36-.11.09-.23.2-.1.4.13.2.58.96 1.25 1.56.86.77 1.58 1.01 1.8 1.12.22.11.35.09.48-.05.13-.14.56-.65.71-.87.15-.22.3-.18.5-.11.2.07 1.29.61 1.51.72.22.11.37.17.42.26.06.09.06.52-.12 1.04z" fill="#25ab21"/></svg>
          </div>
          <div><div class="sheet-opt-label">Share on WhatsApp</div><div class="sheet-opt-sub">Send to family or partner</div></div>
        </div>
        <div class="sheet-opt" onclick="showToast('Link copied!');setTimeout(closePdf,1200)">
          <div class="sheet-opt-icon">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </div>
          <div><div class="sheet-opt-label">Copy Link</div><div class="sheet-opt-sub">Share anywhere</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const CC = document.getElementById('CC');
function sb(){ CC.scrollTo({top:CC.scrollHeight,behavior:'smooth'}); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function userMsg(text){
  const d=document.createElement('div');
  d.className='user-msg';
  d.innerHTML=`<div class="user-bubble">${text}</div>`;
  CC.appendChild(d); sb();
}

function aiMsg(html, withFb=true){
  const row=document.createElement('div');
  row.className='ai-msg';
  row.innerHTML=`<div class="ai-avatar">🔮</div><div class="ai-content"><div class="ai-text">${html}</div></div>`;
  CC.appendChild(row);
  if(withFb){
    const fb=document.createElement('div'); fb.className='feedback-row';
    fb.innerHTML=`<button class="fb-btn" onclick="showToast('Helpful!')"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg></button><button class="fb-btn" onclick="showToast('Noted')"><svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg></button>`;
    CC.appendChild(fb);
  }
  sb(); return row;
}

function thinking(cb, delay=1800){
  const row=document.createElement('div');
  row.className='thinking-row';
  row.innerHTML=`<div class="thinking-avatar">🔮</div><div class="thinking-dots"><span></span><span></span><span></span></div>`;
  CC.appendChild(row); sb();
  setTimeout(()=>{ row.remove(); cb(); }, delay);
}

// ── Boot ──
(function init(){
  const row=document.createElement('div'); row.className='ai-msg';
  row.innerHTML=`<div class="ai-avatar">🔮</div><div class="ai-content"><div class="ai-text">Namasté! 🙏 Enter birth details for <strong>both people</strong> and I'll analyse their Kundali Milan — Gun Milan score, compatibility strengths, concerns, and more.</div></div>`;
  CC.appendChild(row);

  // Form card
  const fc=document.createElement('div'); fc.id='formRow'; fc.className='ai-msg'; fc.style.animationDelay='0.15s';
  fc.innerHTML=`
    <div style="width:32px;flex-shrink:0;"></div>
    <div style="flex:1;">
      <div class="form-card">
        <div class="fc-header">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm5.21 7.71l-6 6a1.002 1.002 0 01-1.42 0l-3-3a1.003 1.003 0 111.42-1.42l2.29 2.3 5.29-5.3a1.004 1.004 0 011.42 1.42z" fill="#fff"/></svg>
          <div class="fc-header-title">Birth Details</div>
        </div>
        <div class="fc-cols">
          <div class="fc-col">
            <div class="fc-col-label">👤 Person 1</div>
            <div class="field-group"><div class="field-label">Full Name</div><input class="field-input" id="p1name" placeholder="e.g. Arjun" value="Arjun Sharma"></div>
            <div class="field-group"><div class="field-label">Date of Birth</div><input class="field-input" id="p1dob" placeholder="DD/MM/YYYY" value="15/08/1995"></div>
            <div class="field-group"><div class="field-label">Time of Birth</div><input class="field-input" id="p1tob" placeholder="HH:MM AM/PM" value="10:30 AM"></div>
            <div class="field-group"><div class="field-label">City</div><input class="field-input" id="p1city" placeholder="City" value="Mumbai"></div>
          </div>
          <div class="fc-col">
            <div class="fc-col-label">👤 Person 2</div>
            <div class="field-group"><div class="field-label">Full Name</div><input class="field-input" id="p2name" placeholder="e.g. Priya" value="Priya Verma"></div>
            <div class="field-group"><div class="field-label">Date of Birth</div><input class="field-input" id="p2dob" placeholder="DD/MM/YYYY" value="22/03/1997"></div>
            <div class="field-group"><div class="field-label">Time of Birth</div><input class="field-input" id="p2tob" placeholder="HH:MM AM/PM" value="06:15 AM"></div>
            <div class="field-group"><div class="field-label">City</div><input class="field-input" id="p2city" placeholder="City" value="Delhi"></div>
          </div>
        </div>
        <button class="fc-match-btn" onclick="startMatch()">✨ Match Kundali</button>
        <div class="fc-footer">
          <span class="fc-or">or</span>
          <button class="fc-upload" onclick="showToast('PDF upload coming soon')">
            <svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M13 6V2H7.5A2.5 2.5 0 005 4.5v15A2.5 2.5 0 007.5 22h10a2.5 2.5 0 002.5-2.5V9h-4a3 3 0 01-3-3zm3 1h4a2 2 0 00-.59-1.41l-3-3A2 2 0 0015 2v4a1 1 0 001 1z" fill="currentColor"/></svg>
            Upload Kundali PDFs
          </button>
        </div>
      </div>
    </div>`;
  CC.appendChild(fc); sb();
})();

function startMatch(){
  const p1=document.getElementById('p1name').value||'Person 1';
  const p2=document.getElementById('p2name').value||'Person 2';
  document.getElementById('formRow').remove();
  userMsg(`Match Kundali for ${p1} &amp; ${p2}`);
  thinking(()=>showGenSteps(p1,p2), 600);
}

function showGenSteps(p1,p2){
  const row=document.createElement('div'); row.className='ai-msg';
  row.innerHTML=`
    <div class="ai-avatar">🔮</div>
    <div class="ai-content">
      <div class="gen-card">
        <div class="gen-title">Analysing Kundalis…</div>
        <div class="gen-step" id="gs1"><div class="step-dot"></div>Calculating Rashi &amp; Nakshatra positions</div>
        <div class="gen-step" id="gs2"><div class="step-dot"></div>Running Gun Milan (8-koot analysis)</div>
        <div class="gen-step" id="gs3"><div class="step-dot"></div>Checking Dosha &amp; planetary compatibility</div>
      </div>
    </div>`;
  CC.appendChild(row); sb();
  setTimeout(()=>{ document.getElementById('gs1').classList.add('active'); sb(); },200);
  setTimeout(()=>{ document.getElementById('gs1').classList.replace('active','done'); document.getElementById('gs2').classList.add('active'); sb(); },1100);
  setTimeout(()=>{ document.getElementById('gs2').classList.replace('active','done'); document.getElementById('gs3').classList.add('active'); sb(); },2000);
  setTimeout(()=>{ document.getElementById('gs3').classList.replace('active','done'); sb(); },2800);
  setTimeout(()=>{ row.remove(); showResults(p1,p2); },3300);
}

function kootRow(name,score,max,color){
  const pct=Math.round((score/max)*100);
  const icon=score===max?'✅':score>=max*0.6?'⚠️':'❌';
  return `<div class="koot-row"><div class="koot-name">${name}</div><div class="koot-bar-wrap"><div class="koot-bar" style="width:${pct}%;background:${color};"></div></div><div class="koot-score">${score}/${max}</div><div class="koot-icon">${icon}</div></div>`;
}

function showResults(p1,p2){
  document.getElementById('sheetSub').textContent=`${p1} & ${p2} · 28/36`;

  const row=document.createElement('div'); row.className='ai-msg';
  row.innerHTML=`
    <div class="ai-avatar">🔮</div>
    <div class="ai-content">
      <div class="score-card">
        <div class="sc-header">
          <div class="sc-ring">
            <svg viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
              <circle cx="32" cy="32" r="26" fill="none" stroke="#f7ab20" stroke-width="6"
                stroke-dasharray="163" stroke-dashoffset="37" stroke-linecap="round"
                transform="rotate(-90 32 32)"/>
              <text x="32" y="37" text-anchor="middle" fill="#fff" font-family="JioType,sans-serif" font-size="15" font-weight="900">28</text>
            </svg>
          </div>
          <div class="sc-info">
            <div class="sc-names">${p1} &amp; ${p2}</div>
            <div class="sc-score-row"><span class="sc-num">28</span><span class="sc-denom">/ 36 points</span></div>
            <div class="sc-verdict">✨ Strong Match</div>
          </div>
        </div>
        <div class="sc-highlights">
          <div class="sc-highlight"><span class="sc-hi-icon">✅</span><span><strong>Graha Maitri 5/5</strong> — Exceptional mental compatibility. Shared values, thinking style &amp; emotional wavelength.</span></div>
          <div class="sc-highlight"><span class="sc-hi-icon">✅</span><span><strong>Bhakoot 7/7</strong> — Strong financial &amp; family harmony. Wealth grows together after marriage.</span></div>
          <div class="sc-highlight"><span class="sc-hi-icon">⚠️</span><span><strong>Nadi 2/8</strong> — Low Nadi score. Health of children may need attention. Remedy available.</span></div>
        </div>
        <button class="koot-toggle" id="kootToggle" onclick="toggleKoot()">
          <span>See all 8 Gun Milan matches</span>
          <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </button>
        <div class="koot-table" id="kootTable">
          ${kootRow('Varna',1,1,'#25ab21')}
          ${kootRow('Vashya',2,2,'#25ab21')}
          ${kootRow('Tara',3,3,'#25ab21')}
          ${kootRow('Yoni',3,4,'#f7ab20')}
          ${kootRow('Graha Maitri',5,5,'#25ab21')}
          ${kootRow('Gana',5,6,'#f7ab20')}
          ${kootRow('Bhakoot',7,7,'#25ab21')}
          ${kootRow('Nadi',2,8,'#fa2f40')}
          <div class="koot-total"><span>Total</span><span>28 / 36</span></div>
        </div>
      </div>
    </div>`;
  CC.appendChild(row);

  const fb=document.createElement('div'); fb.className='feedback-row';
  fb.innerHTML=`<button class="fb-btn" onclick="showToast('Helpful!')"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg></button><button class="fb-btn" onclick="showToast('Noted')"><svg viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg></button>`;
  CC.appendChild(fb);

  setTimeout(()=>{
    const ar=document.createElement('div'); ar.className='ai-msg';
    ar.innerHTML=`
      <div style="width:32px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div class="astro-card">
          <div class="astro-avatar">🧘</div>
          <div class="astro-info">
            <div class="astro-name">Talk to an Astrologer</div>
            <div class="astro-sub">Picks up from this analysis</div>
            <div class="astro-ctx">✦ Kundali &amp; score already shared</div>
          </div>
          <button class="astro-btn" onclick="connectAstro()">Connect</button>
        </div>
      </div>`;
    CC.appendChild(ar); sb();

    setTimeout(()=>{
      const cr=document.createElement('div'); cr.className='chip-row';
      cr.innerHTML=`
        <button class="chip chip-appear-1" onclick="askNadi()">Why is Nadi low?</button>
        <button class="chip chip-appear-2" onclick="askMeaning()">What does 28/36 mean?</button>
        <button class="chip chip-appear-3 cta" onclick="openPdfSheet()">Share as PDF</button>
        <button class="chip chip-appear-4 gold" onclick="askRemedy()">Nadi remedy?</button>`;
      CC.appendChild(cr); sb();
    },300);
  },500);
}

function toggleKoot(){
  const t=document.getElementById('kootTable');
  t.classList.toggle('open');
  const btn=document.getElementById('kootToggle');
  const path=btn.querySelector('svg path');
  path.setAttribute('d',t.classList.contains('open')
    ?'M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6 1.41 1.41z'
    :'M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z');
  sb();
}

function askNadi(){
  userMsg('Why is Nadi score low?');
  thinking(()=>{
    aiMsg(`<strong>Nadi Dosha</strong> occurs when both partners share the same Nadi — Adi, Madhya, or Antya.<br><br>Arjun and Priya both have <strong>Antya Nadi</strong>, which traditionally signals potential health challenges for children and overall vitality.<br><br>Their score is <strong>2/8</strong> (not 0), meaning partial cancellation applies — their Rashi lords are friendly, which reduces severity considerably. 🙏`);
    const cr=document.createElement('div'); cr.className='chip-row';
    cr.innerHTML=`<button class="chip chip-appear-1" onclick="askRemedy()">What remedy helps?</button><button class="chip chip-appear-2" onclick="askMeaning()">Is 28/36 still good?</button>`;
    CC.appendChild(cr); sb();
  });
}

function askMeaning(){
  userMsg('What does 28/36 mean for us?');
  thinking(()=>{
    aiMsg(`<strong>28/36 is an excellent score</strong> — placing Arjun and Priya in the top tier of compatibility. 🌟<br><br>Benchmarks:<br>• <strong>18–24</strong> — Acceptable match<br>• <strong>24–32</strong> — Good to excellent ✅<br>• <strong>32+</strong> — Very rare<br><br>At 28, strong mental harmony (Graha Maitri 5/5), excellent financial compatibility (Bhakoot 7/7), and the Nadi concern is partially cancelled. Most astrologers would give a <strong>positive recommendation</strong>.`);
    const cr=document.createElement('div'); cr.className='chip-row';
    cr.innerHTML=`<button class="chip chip-appear-1" onclick="askRemedy()">Remedy for Nadi?</button><button class="chip chip-appear-2 cta" onclick="openPdfSheet()">Download report</button>`;
    CC.appendChild(cr); sb();
  });
}

function askRemedy(){
  userMsg('What is the remedy for Nadi Dosha?');
  thinking(()=>{
    aiMsg(`The most prescribed remedy is the <strong>Nadi Nivarana Puja</strong> — performed before the wedding by a qualified priest.<br><br>Additionally:<br>• Donate gold to a temple on the wedding day<br>• Recite <strong>Mahamrityunjaya Mantra</strong> 108 times daily for 40 days<br>• Feed cows on Ekadashi<br><br>Since their score is 2/8 (not 0), the dosha is <em>partial</em> — a single puja is typically sufficient. 🙏`);
    const cr=document.createElement('div'); cr.className='chip-row';
    cr.innerHTML=`<button class="chip chip-appear-1" onclick="connectAstro()">Talk to Astrologer</button><button class="chip chip-appear-2 cta" onclick="openPdfSheet()">Share as PDF</button>`;
    CC.appendChild(cr); sb();
  });
}

function connectAstro(){
  userMsg('Connect me to an astrologer');
  thinking(()=>{
    aiMsg(`I've shared the full Kundali Milan report — score, 8-koot breakdown, and Nadi concern — with the astrologer. They'll continue right from here. 🙏
      <div style="margin-top:10px;background:var(--surface-ghost);border-radius:12px;padding:12px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--surface-ghost-icon);display:flex;align-items:center;justify-content:center;font-size:20px;">🧘</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--text-high);">Pandit Rajesh Sharma</div>
            <div style="font-size:11px;color:var(--success);font-weight:600;">● Available now</div>
            <div style="font-size:11px;color:var(--text-low);">22 yrs exp · Hindi &amp; English</div>
          </div>
        </div>
        <button style="margin-top:10px;width:100%;background:var(--primary-50);border:none;border-radius:var(--shape-pill);padding:11px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:'JioType',sans-serif;" onclick="showToast('Connecting to astrologer…')">📞 Start Call — Free 5 min</button>
      </div>`);
  },1200);
}

function openPdfSheet(){ document.getElementById('pdfSheet').classList.add('open'); }
function closePdf(){ document.getElementById('pdfSheet').classList.remove('open'); }

function handleInput(){
  const inp=document.getElementById('chatInput');
  const val=inp.value.trim(); if(!val) return;
  inp.value=''; userMsg(val);
  thinking(()=>{ aiMsg(`Based on Arjun and Priya's Kundali Milan analysis, I can see that their planetary positions are <strong>highly favourable</strong> in this regard. For deeper personalised insights, connect with an astrologer who can review the full chart. 🔮`); });
}
</script>
